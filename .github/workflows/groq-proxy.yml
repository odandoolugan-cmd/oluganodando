name: Groq API Proxy

on:
  workflow_dispatch:
    inputs:
      pregunta:
        description: 'Tu pregunta para Groq'
        required: true
        type: string

jobs:
  llamar-groq:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Llamar a Groq API
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          RESPUESTA=$(curl -s -X POST https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"llama3-8b-8192\",
              \"messages\": [{\"role\": \"user\", \"content\": \"${{ github.event.inputs.pregunta }}\"}]
            }")
          echo "$RESPUESTA" > respuesta.json
      
      - name: Guardar respuesta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add respuesta.json
          git commit -m "Actualizar respuesta de Groq" || echo "Sin cambios"
          git push

          "Agregar proxy de Groq API"
